<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AruTaba - チャット</title>
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/friendchat.css">
</head>
<body>

    <!-- ヘッダー -->
    <header class="header">
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="logo">AruTaba</div>
    </header>

    <!-- サイドメニュー -->
    <nav class="sidebar" id="sidebar">
        <ul>
            <li>🏠 ホーム</li>
            <li>👥 フレンド</li>
            <li>📅 カレンダー</li>
            <li>📋 掲示板</li>
            <li>⌨ 数値入力</li>
            <li>🔔 お知らせ</li>
            <li>⚙ プロフィール設定</li>
        </ul>
        <button class="logout">ログアウト</button>
    </nav>

    <!-- オーバーレイ（サイドバー展開時） -->
    <div class="overlay" id="overlay"></div>

    <!-- チャットエリア -->
    <main class="chat-wrapper">
        <!-- 相手のヘッダー情報 -->
        <div class="chat-header">
            <div class="chat-header-icon">👤</div>
            <div class="chat-header-name" id="friendName"></div>
            <div class="chat-header-status">オンライン</div>
        </div>

        <!-- メッセージ一覧 -->
        <div class="chat-container" id="chatContainer">
            <!-- メッセージはJSで動的に追加 -->
            <div class="loading-msg" id="loadingMsg">読み込み中…</div>
        </div>

        <!-- 入力エリア -->
        <div class="chat-input-area">
            <button class="plus-btn" title="ファイル添付">＋</button>
            <input
                type="text"
                id="messageInput"
                placeholder="メッセージを入力"
                autocomplete="off"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">送信</button>
        </div>
    </main>

    <!-- フッター -->
    <footer class="footer"></footer>

    <script src="../javascript/main.js"></script>
    <script src="../javascript/friendchat.js"></script>
    <script>

    const urlParams = new URLSearchParams(window.location.search);
    const friendMail = urlParams.get("mail");

    //fetchが飛ばない！！！！！！！！！！！！！！！！！！！！！！！！！！！！！！！
    const response = await fetch(
    "../backend/friendchat_mail.php",
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            mail: friendMail
            })
        }
    );

    const result = await response.json();

    console.log(result);
    </script>
</body>
</html>
