<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Chat UI</title>

  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/profile_setting.css" />
  <link rel="stylesheet" href="../css/footer.css">

  <style>
    /* 中央要素 */
    .container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
  padding-top: 80px; /* ← ヘッダーの高さ分だけ追加 */
}

    .card {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 24px;
    }

    /* アイコン */
    .icon {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 1.5px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #555;
      flex-shrink: 0;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      background: #fff;
    }

    .icon .icon-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .icon:hover .icon-overlay {
      opacity: 1;
    }

    /* フォーム */
    .form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form input {
      width: 180px;
      padding: 8px 10px;
      border: 0.5px solid rgba(0, 0, 0, 0.25);
      border-radius: 8px;
      background: #fff;
      color: #222;
      font-size: 14px;
      outline: none;
    }

    .form input:focus {
      border-color: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.06);
    }

    .form button[type="submit"] {
      margin-top: 4px;
      padding: 8px 20px;
      background: #fff;
      border: 0.5px solid rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      font-size: 14px;
      color: #222;
      cursor: pointer;
      align-self: flex-start;
    }

    .form button[type="submit"]:hover {
      background: #f0f0f0;
    }

    #message {
  display: none; /* 最初は非表示 */
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  background: white;
  border-radius: 8px;
  font-size: 14px;
  font-weight: bold;
  z-index: 2000;
}

    /* アカウント削除セクション */
    .danger-zone {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(0, 0, 0, 0.15);
    }

    .danger-zone .delete-account-btn {
      padding: 8px 20px;
      background: #fff;
      border: 0.5px solid #c0392b;
      border-radius: 8px;
      font-size: 14px;
      color: #c0392b;
      cursor: pointer;
    }

    .danger-zone .delete-account-btn:hover {
      background: #fdecea;
    }

    /* 削除確認モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-box h3 {
      margin: 0;
      font-size: 16px;
      color: #222;
    }

    .modal-box p {
      margin: 0;
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }

    .modal-box input {
      padding: 8px 10px;
      border: 0.5px solid rgba(0, 0, 0, 0.25);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    .modal-actions button {
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .modal-cancel-btn {
      background: #fff;
      border: 0.5px solid rgba(0, 0, 0, 0.2);
      color: #222;
    }

    .modal-cancel-btn:hover {
      background: #f0f0f0;
    }

    .modal-confirm-btn {
      background: #c0392b;
      border: none;
      color: #fff;
    }

    .modal-confirm-btn:hover {
      background: #a93226;
    }

  </style>
</head>

<body>

  <!-- ヘッダー -->
  <header class="header">

    <!-- ハンバーガーメニュー -->
    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- タイトル -->
    <div class="logo">
      <a href="home.html">AruTaba</a>
    </div>

  </header>

  <!-- サイドメニュー -->
  <nav class="sidebar" id="sidebar">

    <ul>
      <li>🏠 ホーム</li>
      <li>👥 フレンド</li>
      <li>📅 カレンダー</li>
      <li>📋 掲示板</li>
      <li>⌨ 数値入力</li>
      <li>🔔 お知らせ</li>
      <li>⚙ プロフィール設定</li>
    </ul>

    <button class="logout">ログアウト</button>
  </nav>

  <!-- 中央要素 -->
  <div class="container">
    <div class="card">

      <!-- アイコン（クリックで画像選択 → 選択時に即アップロード） -->
      <div class="icon" id="iconWrapper">
        <img id="iconImage" src="" alt="" style="display:none;">
        <span id="iconPlaceholder">アイコン</span>
        <div class="icon-overlay">変更</div>
        <input type="file"
               id="iconInput"
               name="icon_image"
               accept="image/png, image/jpeg, image/gif, image/webp"
               style="display:none;">
      </div>


<form class="form" id="profileForm" method="post" action="profile_setting.php">

            <input type="text"
                  name="user_name"
                  placeholder="名前">

            <input type="email"
                  name="mail_address"
                  placeholder="メールアドレス">

            <input type="password"
                  name="password"
                  placeholder="パスワード">

            <input type="number"
                  name="smoking_limit"
                  placeholder="喫煙上限（本/日）"
                  min="0">

            <input type="number"
                  name="drinking_limit"
                  placeholder="飲酒上限（杯/日）"
                  min="0">

            <button type="submit">登録</button>

            <div class="danger-zone">
              <button type="button" class="delete-account-btn" id="openDeleteModalBtn">アカウントを削除</button>
            </div>


      </form>

    </div>
  </div>
  <div id="message"></div>

  <!-- 削除確認モーダル -->
  <div class="modal-overlay" id="deleteModalOverlay">
    <div class="modal-box">
      <h3>本当にアカウントを削除しますか？</h3>
      <p>この操作は取り消せません。プロフィール・カレンダー記録・フレンド・掲示板の投稿などすべてのデータが削除されます。続けるにはパスワードを入力してください。</p>
      <input type="password" id="deleteConfirmPassword" placeholder="パスワード">
      <div class="modal-actions">
        <button type="button" class="modal-cancel-btn" id="cancelDeleteBtn">キャンセル</button>
        <button type="button" class="modal-confirm-btn" id="confirmDeleteBtn">削除する</button>
      </div>
    </div>
  </div>

  <!-- フッター -->
  <footer class="footer"></footer>
  <script src="../javascript/profile_setting.js"></script>
  <script src="../javascript/main.js"></script>
 
  

</body>
</html>
