<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フレンド一覧</title>

    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/friend.css">
    <link rel="stylesheet" href="../css/footer.css">
</head>

<body>

<!-- ヘッダー -->
<header class="header">
    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="logo">AruTaba</div>
</header>

<!-- サイドメニュー -->
<nav class="sidebar" id="sidebar">
    <ul>
        <li>🏠 ホーム</li>
        <li>👥 フレンド</li>
        <li>📅 カレンダー</li>
        <li>📋 掲示板</li>
        <li>⌨ 数値入力</li>
        <li>🔔 お知らせ</li>
        <li>⚙ プロフィール設定</li>
    </ul>
    <button class="logout">ログアウト</button>
</nav>

<!-- メインコンテンツ -->
<main class="friend-container">

    <!-- 検索欄 -->
    <div class="search-box">
        <input type="text" id="friend-search" placeholder="フレンドを検索 / フレンド申請">  
        <button id="search-btn">検索</button>

    </div>

    <!-- タブ切り替えボタン -->
    <div class="friend-tabs">
        <button id="tab-friend" class="active">フレンド一覧</button>
        <button id="tab-request">承認待ち</button>
    </div>

    <!-- フレンド一覧 -->
    <div id="friend-list" class="tab-content active">
        <ul>
            <li>山田太郎</li>
            <li>佐藤花子</li>
            <li>田中一郎</li>
        </ul>
    </div>

    <!-- 承認待ち -->
    <div id="request-list" class="tab-content">
        <ul>
            <li>鈴木次郎 <button class="approve">承認</button></li>
            <li>高橋美咲 <button class="approve">承認</button></li>
        </ul>
    </div>

</main>

<!-- フッター -->
<footer class="footer"></footer>

<script src="../javascript/main.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {


        const searchBtn = document.getElementById("search-btn");

        searchBtn.addEventListener("click", () => {
            const friendId = document.getElementById("friend-search").value;

            

            // PHP に friend_id を送信
            fetch("../backend/friend_kensaku.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: new URLSearchParams({
                    friend_id: friendId
                })
            })
            .then(res => res.json())
            .then(data => {
                console.log(data);

                if (data.status === "ok") {
                    alert("フレンド申請を送りました！");
                } else {
                    alert("エラー：" + data.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert("通信エラー");
            });
        });
        // ============================
    // タブ切り替え
    // ============================
    const tabFriend = document.getElementById("tab-friend");
    const tabRequest = document.getElementById("tab-request");

    const friendList = document.getElementById("friend-list");
    const requestList = document.getElementById("request-list");

    tabFriend.addEventListener("click", () => {
        tabFriend.classList.add("active");
        tabRequest.classList.remove("active");

        friendList.classList.add("active");
        requestList.classList.remove("active");
    });

    tabRequest.addEventListener("click", () => {
        tabRequest.classList.add("active");
        tabFriend.classList.remove("active");

        requestList.classList.add("active");
        friendList.classList.remove("active");
    });


    // ============================
    // フレンド検索 → PHP へ送信
    // ============================


});
</script>



</body>
</html>
