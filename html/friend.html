<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フレンド一覧</title>

    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/friend.css">
    <link rel="stylesheet" href="../css/footer.css">
</head>

<body>

<!-- ヘッダー -->
<header class="header">
    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="logo">
        <a href="home.html">AruTaba</a>
    </div>
</header>

<!-- サイドメニュー -->
<nav class="sidebar" id="sidebar">
    <ul>
        <li>🏠 ホーム</li>
        <li>👥 フレンド</li>
        <li>📅 カレンダー</li>
        <li>📋 掲示板</li>
        <li>⌨ 数値入力</li>
        <li>🔔 お知らせ</li>
        <li>⚙ プロフィール設定</li>
    </ul>
    <button class="logout">ログアウト</button>
</nav>

<!-- メインコンテンツ -->
<main class="friend-container">

    <div class="friend-header-row">
        <span class="page-title">フレンド</span>
        <span class="friend-count-badge" id="friend-count-badge">0人</span>
    </div>

    <div class="search-box">
        <input type="text" id="friend-search" placeholder="メールアドレスでフレンド申請">
        <button id="search-btn">送る</button>
    </div>

    <div class="friend-tabs">
        <button id="tab-friend" class="active">
            フレンド一覧
            <span class="tab-badge badge-normal" id="badge-friend">0</span>
        </button>
        <button id="tab-request">
            承認待ち
            <span class="tab-badge badge-alert" id="badge-request" style="display:none;"></span>
        </button>
    </div>

    <div id="friend-list" class="tab-content active">
        <ul class="friend-list-card" id="friend-list-ul"></ul>
    </div>

    <div id="request-list" class="tab-content">
        <ul></ul>
    </div>

</main>

<footer class="footer"></footer>

<script src="../javascript/main.js"></script>
<script src="../javascript/friend.js"></script>

</body>
</html>
