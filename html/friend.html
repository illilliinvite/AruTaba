<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フレンド一覧</title>

    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/friend.css">
    <link rel="stylesheet" href="../css/footer.css">
</head>

<body>

<!-- ヘッダー -->
<header class="header">
    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="logo">AruTaba</div>
</header>

<!-- サイドメニュー -->
<nav class="sidebar" id="sidebar">
    <ul>
        <li>🏠 ホーム</li>
        <li>👥 フレンド</li>
        <li>📅 カレンダー</li>
        <li>📋 掲示板</li>
        <li>⌨ 数値入力</li>
        <li>🔔 お知らせ</li>
        <li>⚙ プロフィール設定</li>
    </ul>
    <button class="logout">ログアウト</button>
</nav>

<!-- メインコンテンツ -->
<main class="friend-container">

    <!-- 検索欄 -->
    <div class="search-box">
        <input type="text" id="friend-search" placeholder="メールアドレスでフレンド申請">  
        <button id="search-btn">検索</button>
    </div>

    <!-- タブ切り替えボタン -->
    <div class="friend-tabs">
        <button id="tab-friend" class="active">フレンド一覧</button>
        <button id="tab-request">承認待ち</button>
    </div>

    <!-- フレンド一覧 -->
    <div id="friend-list" class="tab-content active">
        <ul id="friend-list-ul">
            <!-- PHP で取得するならここに JS で追加 -->
        </ul>
    </div>

    <!-- 承認待ち -->
    <div id="request-list" class="tab-content">
        <ul>
            <!-- JS で承認待ちを追加 -->
        </ul>
    </div>

</main>

<!-- フッター -->
<footer class="footer"></footer>

<script src="../javascript/main.js"></script>

<script>
// ============================
// ページ読み込み時
// ============================
document.addEventListener("DOMContentLoaded", () => {

    // ============================
    // フレンド検索
    // ============================
    const searchBtn = document.getElementById("search-btn");
    const searchInput = document.getElementById("friend-search");

    searchBtn.addEventListener("click", () => {
        const friendId = searchInput.value.trim();

        if (friendId === "") {
            alert("検索ワードを入力してください");
            return;
        }

        fetch("../backend/friend.send.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({
                friend_id: friendId
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log(data);

            if (data.status === "ok") {
                alert("フレンド申請を送信しました");
            } else {
                alert("エラー：" + data.message);
            }
        })
        .catch(err => {
            console.error(err);
            alert("通信エラー");
        });
    });

    // ============================
// フレンド一覧の取得
// ============================
    function loadFriends() {
        fetch("../backend/friend_llist.php")
            .then(res => res.json())
            .then(data => {
                const friendList = document.querySelector("#friend-list-ul");
                friendList.innerHTML = "";

                if (data.status !== "ok" || data.friends.length === 0) {
                    friendList.innerHTML = "<li>フレンドはいません</li>";
                    return;
                }

                data.friends.forEach(item => {
                const li = document.createElement("li");

                li.textContent = item.user_name ?? "(名前なし)";

                // クリックでチャットページへ遷移
                li.addEventListener("click", () => {
                    window.location.href = `/friendchat.html?mail=${encodeURIComponent(item.mail_address)}`;
                });

                friendList.appendChild(li);
});
            })
            .catch(err => {
                console.error(err);
                alert("フレンド一覧の取得に失敗しました");
            });
    }

    // ============================
    // タブ切り替え
    // ============================
    const tabFriend = document.getElementById("tab-friend");
    const tabRequest = document.getElementById("tab-request");
    const friendList = document.getElementById("friend-list");
    const requestList = document.getElementById("request-list");

    tabFriend.addEventListener("click", () => {
        tabFriend.classList.add("active");
        tabRequest.classList.remove("active");

        friendList.classList.add("active");
        requestList.classList.remove("active");
    });

    tabRequest.addEventListener("click", () => {
        tabRequest.classList.add("active");
        tabFriend.classList.remove("active");

        requestList.classList.add("active");
        friendList.classList.remove("active");
    });

    // 初回ロード
    loadRequests();
    loadFriends();
});


// ============================
// 承認待ち一覧の取得
// ============================
function loadRequests() {
    fetch("../backend/friend_recive.php")
        .then(res => res.json())
        .then(data => {
            console.log(data);

            const requestList = document.querySelector("#request-list ul");
            requestList.innerHTML = ""; // 一旦クリア

            if (data.status !== "ok" || data.requests.length === 0) {
                requestList.innerHTML = "<li>承認待ちはありません</li>";
                return;
            }

            data.requests.forEach(item => {
                const li = document.createElement("li");
                li.innerHTML = `
                    ${item.user_name ?? "(名前なし)"} 
                    <button class="approve" data-user-id="${item.user_id}">
                        承認
                    </button>
                `;
                requestList.appendChild(li);
            });
        })
        .catch(err => {
            console.error(err);
            alert("承認待ちの取得に失敗しました");
        });
}


// ============================
// 承認ボタンの処理
// ============================
document.addEventListener("click", function(e) {
    if (e.target.classList.contains("approve")) {
        const userId = e.target.dataset.userId;

        fetch(`../backend/firend_syounin.php?user_id=${encodeURIComponent(userId)}`)
            .then(res => res.json())
            .then(data => {
                if (data.status === "ok") {
                    alert("承認しました");
                    loadRequests(); // 再読み込み
                } else {
                    alert("エラー：" + data.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert("通信エラー");
            });
    }
});



</script>

</body>
</html>
