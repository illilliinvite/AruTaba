<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AruTaba 掲示板</title>
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/keiziban.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>

<body>

<header class="header">
    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>
    <div class="logo">AruTaba</div>
</header>

<nav class="sidebar" id="sidebar">
    <ul>
        <li>🏠 ホーム</li>
        <li>👥 フレンド</li>
        <li>📅 カレンダー</li>
        <li>📋 掲示板</li>
        <li>⌨ 数値入力</li>
        <li>🔔 お知らせ</li>
        <li>⚙ プロフィール設定</li>
    </ul>
    <button class="logout">ログアウト</button>
</nav>

<input type="hidden" id="session_user_name" value="">

<main class="main-content">
    <div class="wood-bg">
        <p class="board-title">掲示板</p>
        <div class="filter-row">
            <div class="filter-select-wrap">
                <select id="year-select"></select>
                <i class="ti ti-chevron-down filter-icon"></i>
            </div>
            <div class="filter-select-wrap">
                <select id="month-select"></select>
                <i class="ti ti-chevron-down filter-icon"></i>
            </div>
        </div>
        <div id="post-list"></div>
        <div class="input-card">
            <textarea id="forum_history" placeholder="投稿する内容を入力..."></textarea>
            <div class="submit-row">
                <button id="sendBtn" class="submit-btn">投稿する</button>
            </div>
        </div>
    </div>
</main>

<script src="../javascript/main.js"></script>
<script src="../javascript/keiziban.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    fetch("../backend/getname.php")
        .then(res => res.json())
        .then(data => {
            if (data.status === "ok") {
                document.getElementById("session_user_name").value = data.user_name;
            }
        });
});
</script>

</body>
</html>
