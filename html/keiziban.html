<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AruTaba 掲示板</title>

    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">

    <style>
        body {
            margin: 0;
            background: #f5f5f5;
            font-family: sans-serif;
        }

        .chat-frame-wrapper {
            width: 100%;
            height: calc(100vh - 300px);
            margin-top: 80px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .chat-input-area {
            position: fixed;
            bottom: 50px;
            left: 0;
            width: 100%;
            background: #ffffff;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ccc;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .chat-input-area button {
            padding: 10px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header class="header">
    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>
    <div class="logo">AruTaba</div>
</header>

<nav class="sidebar" id="sidebar">
    <ul>
        <li>🏠 ホーム</li>
        <li>👥 フレンド</li>
        <li>📅 カレンダー</li>
        <li>📋 掲示板</li>
        <li>⌨ 数値入力</li>
        <li>🔔 お知らせ</li>
        <li>⚙ プロフィール設定</li>
    </ul>
    <button class="logout">ログアウト</button>
</nav>

<script src="../javascript/main.js"></script>

<div class="chat-frame-wrapper">
    <iframe src="chatview.html"></iframe>
</div>

<!-- ★ 自分のユーザー名を hidden で保持 -->
<input type="hidden" id="session_user_name" value="">

<div class="chat-input-area">
    <input type="text" id="forum_history" placeholder="メッセージを入力">
    <button id="sendBtn">送信</button>
</div>

<footer class="footer"></footer>

<script src="../javascript/keiziban.js"></script>
<script>

document.addEventListener("DOMContentLoaded", () => {

    // ★ user_name を取得して hidden にセット
    fetch("../backend/getname.php")   // ← この PHP を作ったと仮定
        .then(res => res.json())
        .then(data => {
            if (data.status === "ok") {
                document.getElementById("session_user_name").value = data.user_name;
            }
        });

    // 既存の処理
    document.getElementById("sendBtn").addEventListener("click", sendChat);
    document.getElementById("forum_history").addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendChat();
    });
    document.querySelector("iframe").addEventListener("load", initIframeFunctions);
});


</script>

</body>
</html>
