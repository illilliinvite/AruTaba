<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AruTaba 掲示板</title>

    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">

    <style>
        body {
            margin: 0;
            background: #f5f5f5;
            font-family: sans-serif;
        }

        /* iframe を入れる領域 */
        .chat-frame-wrapper {
            width: 100%;
            height: calc(100vh - 300px); /* 上のヘッダー + 下の入力欄を除いた高さ */
            margin-top: 80px; /* ヘッダー分の余白 */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ====== 入力欄（画面下固定） ====== */
        .chat-input-area {
            position: fixed;
            bottom: 50px;
            left: 0;
            width: 100%;
            background: #ffffff;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ccc;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .chat-input-area button {
            padding: 10px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- ヘッダー -->
<header class="header">

    <!-- ハンバーガーメニュー -->
    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- タイトル -->
    <div class="logo">AruTaba</div>

</header>

<!-- サイドメニュー -->
<nav class="sidebar" id="sidebar">

    <ul>
        <li>🏠 ホーム</li>
        <li>👥 フレンド</li>
        <li>📅 カレンダー</li>
        <li>📋 掲示板</li>
        <li>⌨ 数値入力</li>
        <li>🔔 お知らせ</li>
        <li>⚙ プロフィール設定</li>
    </ul>

    <button class="logout">ログアウト</button>
</nav>
<script src="../javascript/main.js"></script>
<link rel="stylesheet" href="../css/header.css">

<!-- ▼ ここに iframe を追加 ▼ -->
<div class="chat-frame-wrapper">
    <iframe src="chatview.html"></iframe>
</div>

<!-- 入力欄 -->
<div class="chat-input-area">
    <input type="text" id="user_name" hidden value="me" placeholder="ユーザー名">
    <input type="text" id="forum_history" placeholder="メッセージを入力">
    <button id="sendBtn">送信</button>
</div>

<footer class="footer"></footer>

<script src="../javascript/keiziban.js"></script>

</body>
</html>
