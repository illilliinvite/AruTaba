<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AruTaba</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: #111;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #stage {
      position: fixed;
      inset: 0;
    }

    /* ロゴ */
    #logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.75);
      font-size: clamp(40px, 8vw, 72px);
      font-style: italic;
      font-family: Georgia, 'Times New Roman', serif;
      color: #fff;
      white-space: nowrap;
      letter-spacing: -1px;
      opacity: 0;
      transition: none;
    }

    /* LOGIN SUCCESSFUL */
    #suc {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.2em;
      white-space: nowrap;
      opacity: 0;
      transition: none;
    }

    /* ホームへのフェードオーバーレイ */
    #fade-overlay {
      position: fixed;
      inset: 0;
      background: #dcecef;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.65s ease;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div id="stage"></div>
  <div id="fade-overlay"></div>

  <script>
    const ICONS = [
      // タバコ（左上）
      { id:'i0', xp:0.10, yp:0.18, svg:`<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="32" width="48" height="8" rx="2" stroke="white" stroke-width="1.5"/><rect x="56" y="30" width="8" height="12" rx="1" stroke="white" stroke-width="1.5"/><line x1="16" y1="32" x2="16" y2="40" stroke="white" stroke-width="1.5"/><path d="M22 26 Q25 17 21 11" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M29 26 Q33 15 28 8" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>` },
      // ワイングラス（右上）
      { id:'i1', xp:0.82, yp:0.15, svg:`<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M24 10 L48 10 L40 36 Q36 42 36 42 Q36 42 32 36 Z" stroke="white" stroke-width="1.5" stroke-linejoin="round" fill="none"/><line x1="36" y1="42" x2="36" y2="60" stroke="white" stroke-width="1.5"/><line x1="26" y1="60" x2="46" y2="60" stroke="white" stroke-width="1.5"/><path d="M24 24 Q36 30 48 24" stroke="white" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/></svg>` },
      // ビール缶（右中）
      { id:'i2', xp:0.85, yp:0.65, svg:`<svg width="66" height="66" viewBox="0 0 66 66" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="16" y="16" width="34" height="40" rx="6" stroke="white" stroke-width="1.5"/><ellipse cx="33" cy="16" rx="17" ry="5" stroke="white" stroke-width="1.5"/><rect x="22" y="8" width="22" height="8" rx="3" stroke="white" stroke-width="1.5"/><line x1="16" y1="28" x2="50" y2="28" stroke="white" stroke-width="1" opacity="0.4"/><line x1="16" y1="36" x2="50" y2="36" stroke="white" stroke-width="1" opacity="0.4"/></svg>` },
      // タバコ斜め（左下）
      { id:'i3', xp:0.08, yp:0.72, svg:`<svg width="66" height="66" viewBox="0 0 66 66" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="28" width="44" height="8" rx="2" stroke="white" stroke-width="1.5" transform="rotate(-22 5 28)"/><rect x="49" y="19" width="9" height="11" rx="1" stroke="white" stroke-width="1.5" transform="rotate(-22 49 19)"/><path d="M16 20 Q18 12 14 6" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>` },
      // ウイスキーグラス（上中央）
      { id:'i4', xp:0.50, yp:0.08, svg:`<svg width="66" height="66" viewBox="0 0 66 66" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 12 L46 12 L40 48 L26 48 Z" stroke="white" stroke-width="1.5" stroke-linejoin="round" fill="none"/><line x1="26" y1="48" x2="40" y2="48" stroke="white" stroke-width="2"/><line x1="20" y1="26" x2="46" y2="26" stroke="white" stroke-width="1" opacity="0.4"/><circle cx="30" cy="20" r="2" fill="white" opacity="0.5"/><circle cx="38" cy="32" r="1.5" fill="white" opacity="0.4"/></svg>` },
      // タバコ煙あり（右中央）
      { id:'i5', xp:0.72, yp:0.40, svg:`<svg width="66" height="66" viewBox="0 0 66 66" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="14" y="38" width="38" height="8" rx="2" stroke="white" stroke-width="1.5"/><rect x="52" y="36" width="8" height="12" rx="1" stroke="white" stroke-width="1.5"/><line x1="22" y1="38" x2="22" y2="46" stroke="white" stroke-width="1.5"/><path d="M28 32 Q31 22 27 14" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M35 32 Q40 20 34 10" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>` },
      // シャンパングラス（左中央）
      { id:'i6', xp:0.22, yp:0.48, svg:`<svg width="66" height="66" viewBox="0 0 66 66" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M26 8 L40 8 L38 30 Q33 38 33 38 Q33 38 28 30 Z" stroke="white" stroke-width="1.5" stroke-linejoin="round" fill="none"/><line x1="33" y1="38" x2="33" y2="56" stroke="white" stroke-width="1.5"/><line x1="25" y1="56" x2="41" y2="56" stroke="white" stroke-width="1.5"/><circle cx="38" cy="14" r="1.5" fill="white" opacity="0.6"/><circle cx="30" cy="20" r="1" fill="white" opacity="0.5"/><circle cx="36" cy="24" r="1" fill="white" opacity="0.4"/></svg>` },
      // ライター（下中央）
      { id:'i7', xp:0.46, yp:0.82, svg:`<svg width="66" height="66" viewBox="0 0 66 66" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="20" y="30" width="26" height="30" rx="4" stroke="white" stroke-width="1.5"/><rect x="26" y="22" width="14" height="10" rx="2" stroke="white" stroke-width="1.5"/><path d="M33 22 Q30 14 33 8 Q36 14 33 22" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/><line x1="20" y1="42" x2="46" y2="42" stroke="white" stroke-width="1" opacity="0.4"/></svg>` },
    ];

    const stage = document.getElementById('stage');

    function buildScene() {
      stage.innerHTML = '';

      ICONS.forEach(ic => {
        const d = document.createElement('div');
        d.id = ic.id;
        d.style.cssText = `position:absolute;left:${ic.xp*100}%;top:${ic.yp*100}%;transform:translate(-50%,-50%) scale(0.7);opacity:0;transition:none;`;
        d.innerHTML = ic.svg;
        stage.appendChild(d);
      });

      const logo = document.createElement('div');
      logo.id = 'logo';
      logo.textContent = 'AruTaba';
      logo.style.cssText = `position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.75);font-size:clamp(40px,8vw,72px);font-style:italic;font-family:Georgia,'Times New Roman',serif;color:#fff;white-space:nowrap;letter-spacing:-1px;opacity:0;transition:none;`;
      stage.appendChild(logo);

      const suc = document.createElement('div');
      suc.id = 'suc';
      suc.textContent = 'LOGIN SUCCESSFUL';
      suc.style.cssText = `position:absolute;bottom:10%;left:50%;transform:translateX(-50%);font-size:11px;font-family:'Helvetica Neue',Arial,sans-serif;color:rgba(255,255,255,0.35);letter-spacing:0.2em;white-space:nowrap;opacity:0;transition:none;`;
      stage.appendChild(suc);
    }

    function slash(x1p, y1p, x2p, y2p, color, delay, dur) {
      const W = window.innerWidth, H = window.innerHeight;
      const x1=W*x1p, y1=H*y1p, x2=W*x2p, y2=H*y2p;
      const dx=x2-x1, dy=y2-y1;
      const len=Math.sqrt(dx*dx+dy*dy);
      const ang=Math.atan2(dy,dx)*180/Math.PI;
      const line = document.createElement('div');
      line.style.cssText = `position:absolute;left:${x1}px;top:${y1}px;width:0;height:2.5px;background:${color};transform-origin:left center;transform:rotate(${ang}deg);opacity:1;border-radius:1px;box-shadow:0 0 6px ${color};`;
      stage.appendChild(line);
      setTimeout(() => {
        line.style.transition = `width ${dur||130}ms ease-out`;
        line.style.width = len + 'px';
        setTimeout(() => {
          line.style.transition = 'opacity 0.2s ease';
          line.style.opacity = '0';
          setTimeout(() => line.remove(), 200);
        }, (dur||130) + 30);
      }, delay);
    }

    function killIcon(id, delay) {
      setTimeout(() => {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.transition = 'opacity 0.15s ease, transform 0.2s ease';
        el.style.opacity = '0';
        el.style.transform = 'translate(-50%,-50%) scale(1.3) rotate(8deg)';
      }, delay);
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function run() {
      buildScene();

      // --- 1. アイコン登場 ---
      ICONS.forEach((ic, i) => {
        const el = document.getElementById(ic.id);
        setTimeout(() => {
          el.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          el.style.opacity = '0.7';
          el.style.transform = 'translate(-50%,-50%) scale(1)';
        }, 80 + i * 70);
      });

      await wait(950);

      // --- 2. スラッシュでアイコンを撃破 ---
      const sc = '#4fc3a1';

      slash(0.02, 0.10, 0.42, 0.55, sc, 0);
      killIcon('i0', 60);

      slash(0.45, 0.0, 0.95, 0.28, sc, 160);
      killIcon('i1', 220);
      killIcon('i4', 240);

      slash(0.60, 0.30, 1.0, 0.80, sc, 340);
      killIcon('i2', 400);
      killIcon('i5', 420);

      slash(0.02, 0.55, 0.55, 0.95, sc, 520);
      killIcon('i3', 580);
      killIcon('i6', 600);
      killIcon('i7', 620);

      await wait(950);

      // --- 3. 大スラッシュ×3 → ロゴ召喚 ---
      slash(-0.02, 0.38, 1.02, 0.62, '#fff', 0,   150);
      slash(-0.02, 0.58, 1.02, 0.42, '#fff', 100, 150);
      slash(-0.02, 0.48, 1.02, 0.52, '#aaa', 200, 110);

      await wait(340);

      // --- 4. ロゴ登場 ---
      const logo = document.getElementById('logo');
      logo.style.transition = 'opacity 0.5s ease, transform 0.5s cubic-bezier(0.175,0.885,0.32,1.275)';
      logo.style.opacity = '1';
      logo.style.transform = 'translate(-50%,-50%) scale(1)';

      await wait(500);

      // --- 5. LOGIN SUCCESSFUL ---
      const suc = document.getElementById('suc');
      suc.style.transition = 'opacity 0.5s ease';
      suc.style.opacity = '1';

      await wait(1000);

      // --- 6. ホームカラーへフェード → home.html へ遷移 ---
      const fadeEl = document.getElementById('fade-overlay');
      fadeEl.style.opacity = '1';

      await wait(700);

      window.location.href = 'home.html';
    }

    run();
  </script>

</body>
</html>
